# Business context for Tableau dashboards.
#
# Edit under version control — this is the human-authored side of dashboard
# descriptions. Live metadata (title, project, last update) is pulled from
# Tableau REST at request time and merged with these entries.
#
# Keys:
#   luid           — Tableau view LUID (preferred anchor)
#   slug           — short stable alias used by callers (optional)
#   name           — human-readable title
#   owner          — team or person responsible
#   purpose        — one-line "why this dashboard exists"
#   audience       — who it's for
#   description    — free-form markdown: what's in the dashboard (sheets, views,
#                    filters, what a user actually sees). Write it like you'd
#                    explain the dash to a new hire.
#   how_built      — free-form markdown: how the dashboard is assembled — data
#                    sources, joins, calculated fields, caveats. This is the
#                    part the model needs to answer "why does this number look
#                    like that."
#   kpis           — bullet list of metrics the dashboard actually reports
#   freshness_sla  — expected refresh cadence
#   glossary       — dashboard-specific term definitions
#   notes          — short free-form gotchas, known caveats
#
# Source for all entries below: "Описание логики дашборда Аппаратного
# совещания АЦ" (аудит логики, снэпшот на конец мая — начало июня 2026).
# Все числовые значения KPI в этом файле — иллюстративные снимки на
# конкретную историческую дату отчёта из аудита, а не live-данные. Live
# значения дашборд-контекст сервер подтягивает из Tableau REST при каждом
# запросе; здесь фиксируется только *логика* расчёта.
#
# Формат даты во всех фильтрах ("Дата отчета", "дата сравнения" и т.п.) на
# всех вкладках этого workbook всегда "dd.mm.yyyy" (например, 31.05.2026).

dashboards:
  - slug: svod
    luid: a1af6a72-df6e-4d03-96ef-0153ed2b1840
    name: "План освоения — сводная вкладка"
    owner: "не указано в источнике — уточнить владельца у команды отчётности АЦ"
    purpose: "Сводное отображение исполнения плана освоения по группе ДО (дочерних организаций) на выбранную дату отчёта."
    audience: "Аппаратное совещание АЦ (используется по понедельникам), руководство"
    description: |
      Верхний блок — четыре сквозных KPI-карточки по группе компаний целиком:
      План (8 трлн), Исполнение, Динамика исполнения, % освоения и динамика %.
      Ниже — табличная детализация: одна строка на каждую ДО (БРК, ФРП, Даму,
      ЭКА, QIC, АКК, КАФ, Отбасы Банк, КЖК) с её планом, фактом, динамикой и
      % освоения. Процент по каждой строке визуализируется горизонтальной
      полосой. Общий фильтр — параметр "Дата отчета_MAIN" в правом верхнем
      углу; для динамики используется отдельная "дата сравнения" (обычно
      T-1 неделя от даты отчёта).
    how_built: |
      Это НЕ единый физический источник — сводная вкладка не строится через
      один SQL JOIN. Основной источник для верхних KPI — BRK (оттуда берутся
      расчётные поля общего плана/факта/процента), остальные восемь
      источников (KE/ЭКА, FRP, DAMU, QIC, KAF (СВОД), АКК, OTBASY, KZHK)
      подключены как вторичные через Data Blend / межисточниковые ссылки в
      calculated fields — Tableau берёт уже агрегированные по каждому
      источнику значения и складывает их.

      Формула общего плана:
      `ZN(SUM([PLAN (D_FINANSING_PLAN1)])) + ZN(SUM([KE].[ПЛАН ОБЩИЙ_ЭКА]))
      + ZN(SUM([FRP].[ПЛАН ОБЩИЙ_ФРП])) + ZN(SUM([DAMU].[ПЛАН_ОБЩИЙ_ДАМУ]))
      + ZN(MIN([QIC].[ПЛАН_ОБЩИЙ_QIC])) + ZN(SUM([KAF (СВОД)].[ПЛАН_ОБЩИЙ_КАФ]))
      + ZN(SUM([АКК].[ПЛАН_ОБЩИЙ_АКК]))`

      Формула общего факта аналогична, но суммирует `[Фактическая сумма]`
      (BRK) + `[АКК-ФАКТ]` + `[KAF (СВОД)].[КАФ-ФАКТ]` + `[DAMU].[ДАМУ-ФАКТ]`
      + `[FRP].[ФРП-ФАКТ]` + `[QIC].[ФАКТ-QIC]` + `[KE].[Фактическая сумма
      (ОБЩИЙ ФАКТ)]`. Динамика = факт на дату отчёта минус факт на дату
      сравнения; % освоения = общий факт / общий план.

      Каждая ДО в таблице считает свой собственный "% освоения" по своей же
      формуле (Факт/План), но конкретное выражение отличается по источнику —
      см. записи для конкретных ДО ниже.

      Единая справочная таблица плановых значений для всех источников —
      `D_FINANSING_PLAN` (DWH), с `PLAN_TYPE = 1` (план на уровне программы)
      и `PLAN_TYPE = 2` (общий план по ДО). Большинство источников
      подключают её повторно как `D_FINANSING_PLAN1`, чтобы отдельно достать
      общий план по ДО.

      **Caveats:**
      - `ZN()` используется почти везде, чтобы NULL из отсутствующего
        источника не обнулял всю сумму.
      - Для QIC в формуле общего плана используется `MIN()`, а не `SUM()` —
        это специально, чтобы не задублировать плановое значение при
        агрегации (в источнике QIC плановая строка может повторяться).
      - Видимой программной иерархии на сводной вкладке нет — данные
        агрегированы до уровня "ДО" и общего итога по группе.
    kpis:
      - "По плану (сумма по группе компаний, ~8 трлн тг.)"
      - "Исполнение (тыс. тг., сумма факта по всем ДО)"
      - "Динамика исполнения (факт на дату отчёта минус факт на дату сравнения)"
      - "% освоения (общий факт / общий план)"
      - "Динамика % освоения"
      - "Детализация по ДО: план / факт / динамика / % освоения на каждую строку"
    freshness_sla: "ежедневно в 08:00, данные с лагом T-1"
    glossary:
      ДО: "Дочерняя организация (БРК, ФРП, Даму, ЭКА, QIC, АКК, КАФ, Отбасы Банк, КЖК)"
      PLAN_TYPE: "1 = план на уровне программы, 2 = общий план по ДО"
      "Дата отчета_MAIN": "Параметр даты, управляющий всеми расчётами факта/динамики/процента на вкладке. Формат всегда dd.mm.yyyy"
      "дата сравнения": "База для расчёта динамики, обычно предыдущая контрольная дата (неделя назад). Формат dd.mm.yyyy"
      "ZN()": "Tableau-функция, заменяет NULL на 0"
    notes: |
      На аппаратном совещании смотрят именно эту вкладку по понедельникам.
      Значения на скриншотах аудита (план 8 000 000 000, факт 3 212 105 966,
      % 40,15%, динамика +213 017 420 / +2,66% с 01.06.2026) — иллюстративный
      снимок на конкретную дату, не константы.

  - slug: brk
    luid: 59090c9e-6c05-4fb0-bc63-e735ba1a4db6
    name: "БРК"
    owner: "не указано в источнике"
    purpose: "План, факт, % и динамика освоения по Банку развития Казахстана (БРК)."
    audience: "Аппаратное совещание АЦ"
    description: |
      Три KPI-карточки в верхней части (По плану, Исполнения, % освоения, у
      каждой — своя динамика относительно даты сравнения) плюс детализация
      на листах 3.1 BRK_PLAN / 3.2 BRK_SUM / 3.3 BRK_%. Фильтр "Дата отчета"
      управляет всеми показателями; на самой вкладке дополнительно применён
      worksheet-фильтр DO: БРК.
    how_built: |
      Источник **BRK**: Vertica, server `10.7.7.231`, database `baiterek`.
      Таблицы: `DWH.D_FINANSING_PLAN` (план, основной объект), повторное
      подключение `D_FINANSING_PLAN1` (общий план по ДО, `PLAN_TYPE = 2`),
      `DM.DM_CONTRACT_INFO` (факт). Связь план↔план1 — Tableau Relationship
      по `DO` и `PLAN_TYPE = 2`. Связь план↔факт — через calculated
      expression, которое группирует `Fin Tool Name` факта в программные
      категории плана; в этом выражении отдельные ветки логики для БРК и ЭКА.

      Фильтры на уровне источника: `FIN_TOOL_NAME (D_FINANSING_PLAN1) keeps
      Null` (оставляет строки общего плана) и `DO keeps БРК and ЭКА`
      (источник общий для двух ДО; вкладка БРК дополнительно фильтрует
      worksheet-фильтром `DO: БРК`).

      **KPI-формулы:**
      - По плану (лист 3.1 BRK_PLAN): `Тысяча план = PLAN(D_FINANSING_PLAN1)`, карточка = `SUM(Тысяча план)`.
      - Исполнения (лист 3.2 BRK_SUM): `SUM(Фактическая сумма)`; динамика = `Общий факт − Общий факт_1 неделя`.
      - % освоения (лист 3.3 BRK_%): `% текущий = Фактическая сумма / Тысяча план`, динамика = `ROUND(% текущий,6) − ROUND(% 1 неделя,6)`.

      Data Blend не используется — все три KPI на одном источнике BRK.
    kpis:
      - "По плану (SUM Тысяча план, из PLAN_TYPE=2)"
      - "Исполнения (SUM Фактическая сумма)"
      - "Динамика исполнения"
      - "% освоения (Факт/План)"
      - "Динамика % освоения"
    freshness_sla: "ежедневно в 08:00, данные с лагом T-1"
    glossary:
      "Тысяча план": "PLAN(D_FINANSING_PLAN1) — плановое значение в тыс. тг."
      "Фактическая сумма": "Фактическое освоение на дату отчёта"
      "Дата отчета": "Формат всегда dd.mm.yyyy"
    notes: |
      Пример-снимок из аудита (дата отчёта 31.05.2026, сравнение 25.05.2026):
      план 2 000 000 000, факт 680 493 540 (+25 203 202), % 34,02% (+1,26%).
      RLS обеспечивается на стороне Tableau data source, не переписывается
      этим каталогом — см. ARCHITECTURE.md §6.

  - slug: frp
    luid: e1bd5aff-aee6-4ca7-917f-76946ccf463f
    name: "ФРП"
    owner: "не указано в источнике"
    purpose: "План, факт, % и динамика освоения по программам Фонда развития промышленности (лизинг и финансирование)."
    audience: "Аппаратное совещание АЦ"
    description: |
      Три KPI-карточки (По плану, Исполнения, % освоения) плюс детализация
      по программам и источникам средств. Фильтр "Дата отчета" управляет
      всеми расчётами.
    how_built: |
      Источник **FRP**: Vertica, `10.7.7.231` / `baiterek`, схемы DWH/DM.
      Факт — `DM.DM_FRP_CASH`; план — `D_FINANSING_PLAN` + повторное
      подключение `D_FINANSING_PLAN1` (общий план, `PLAN_TYPE = 2`).

      Relationship факт↔план построен через calculated expression:
      `IF CONTAINS([PROGRAM], '12,6%') THEN 'Привлечение под 12,6% для
      проектов' ELSE 'Валютные средства/ РБ / УК / НФ / Жасыл даму
      /коммерческие средства' END`, результат сопоставляется с полем
      `Fin Source` в таблице планов.

      Фильтр на уровне источника: `FIN_TOOL_NAME (D_FINANSING_PLAN1) keeps
      Null` (общий план ФРП).

      **KPI-формулы:**
      - По плану: `Тысяча план (copy) = PLAN(D_FINANSING_PLAN1)`, карточка = `SUM(...)`.
      - Исполнения: поле `Фактическая сумма = ZN(IF [DM_DATE] = [Дата отчета_MAIN] THEN [PAY_AMOUNT_LCY]/1000 END)`; динамика = `Фактическая сумма − Фактическая сумма 1 неделя`, с отдельными calculated fields для положительной/отрицательной динамики.
      - % освоения: `% Исполнения Общий = SUM(Фактическая сумма) / SUM(Тысяча план)`; динамика = `% текущий − % на дату сравнения`.

      Data Blend не используется.
    kpis:
      - "По плану (SUM Тысяча план (copy))"
      - "Исполнения (SUM Фактическая сумма, PAY_AMOUNT_LCY/1000 на дату отчёта)"
      - "Динамика исполнения"
      - "% освоения"
      - "Динамика % освоения"
    freshness_sla: "ежедневно в 08:00, данные с лагом T-1"
    glossary:
      "PAY_AMOUNT_LCY": "Сумма платежа в валюте счёта, делится на 1000 для отображения в тыс. тг."
      "Дата отчета_MAIN": "Формат всегда dd.mm.yyyy"
    notes: |
      Пример-снимок (дата отчёта 01.06.2026, сравнение 25.05.2026): план
      1 000 000 000, факт 376 377 165 (+3 823 430), % 37,64% (+0,38%).

  - slug: damu
    luid: 7d544152-1193-42d2-a723-78c1dc5d9923
    name: "Даму"
    owner: "не указано в источнике"
    purpose: "План, факт, % и динамика освоения по программам финансирования Даму (гарантии, субсидирование, обусловленное размещение, Орлеу)."
    audience: "Аппаратное совещание АЦ"
    description: |
      Три KPI-карточки (По плану, Исполнения, % освоения) и табличная
      детализация по программам финансирования. Один из самых сложных
      источников каталога — фактические данные строятся через Custom SQL,
      объединяющий несколько наборов данных плюс статические
      корректирующие строки.
    how_built: |
      Источник **DAMU**: Vertica, `10.7.7.231` / `baiterek`, схемы DM/DWH/
      STAGE_DO. Тип — Custom SQL Query + таблица планов.

      Custom SQL строит CTE `base_data` через `UNION ALL` из блоков:
      1. Гарантии из `DM.DM_CONTRACT_INFO` (`DO='Даму'`, `CONTRACT_TYPE=
         'Гарантирование'`).
      2. Статические ручные строки по гарантиям (ГФ 1, ГФ 2, АПК) с
         фиксированными суммами.
      3. Проекты из `DWH.S_PROJECT_INFO_GENERAL` + `DWH.H_PROJECT`
         (`H_PROJECT_SOURCE_NAME IN ('DAMU_DWH_SUBSIDY','DAMU_DWH_FB')` →
         Субсидирование / Обусловленное размещение средств).
      4. Программа Орлеу из stage `STAGE_DO.DAMU_DM_ORLEU`, только последний
         пакет (`PACKAGE_ID = MAX(PACKAGE_ID)`).
      5. Статические корректирующие строки (Орлеу=0, иные виды обусловленного
         финансирования за 2025/2026).

      После этого данные размножаются `CROSS JOIN ('main','second')` — каждая
      строка существует в двух вариантах (`source='main'` и `source=
      'second'`), плюс технический набор `source='del'` с нулевой суммой для
      гарантии присутствия всех программных категорий.

      Relationship факт↔план — calculated expression по `source`,
      `CONTRACT_TYPE`, `PROGRAM_SOURCE_NAME`: для `del`/`main` используется
      `CONTRACT_TYPE`, для `second` — детализация по `CONTRACT_TYPE` +
      `PROGRAM_SOURCE_NAME`.

      Фильтры источника: `FIN_TOOL_NAME (D_FINANSING_PLAN1) keeps Null`
      (общий план) и `Do (D_FINANSING_PLAN) keeps Даму`.

      **KPI-формулы:**
      - По плану: `Тысяча план = PLAN(D_FINANSING_PLAN1)`, `SUM(...)`.
      - Исполнения: `SUM(Фактическая сумма ДАМУ (НОВАЯ))` — разные условия
        отбора по типу программы (гарантии — по `DM_DATE`, субсидирование —
        по периоду `DATE_BEGIN`/`DATE_END`, обусловленное размещение —
        отдельная логика по `CONTRACT_TYPE`); динамика = факт на дату отчёта
        минус факт на дату сравнения.
      - % освоения: `% Даму общий = SUM(Фактическая сумма ДАМУ (НОВАЯ)) /
        SUM(Тысяча план)`.

      Data Blend не выявлен.
    kpis:
      - "По плану (SUM Тысяча план)"
      - "Исполнения (SUM Фактическая сумма ДАМУ (НОВАЯ))"
      - "Динамика исполнения"
      - "% освоения"
      - "Динамика % освоения"
    freshness_sla: "ежедневно в 08:00, данные с лагом T-1"
    glossary:
      Орлеу: "Программа финансирования, данные берутся из stage-таблицы DAMU_DM_ORLEU, только последний загруженный пакет"
      "source (main/second/del)": "Техническое поле размножения строк в Custom SQL для сопоставления с разными уровнями программных категорий плана"
      "Дата отчета": "Формат всегда dd.mm.yyyy"
    notes: |
      Пример-снимок (дата отчёта не зафиксирована явно, сравнение
      25.05.2026): план 3 000 000 000, факт 883 351 113 (+95 871 191),
      % 29,45% (+3,20%). Общий план по ДО может не совпадать с суммой планов
      по программам — это ожидаемая бизнес-логика, не баг.

  - slug: kzhk
    luid: e9a8993b-f275-47a2-a94e-3e171cf9bb5b
    name: "КЖК"
    owner: "не указано в источнике"
    purpose: "План, факт, % и динамика освоения по программам жилищного строительства КЖК (выкуп облигаций МИО, гарантирование долевого участия и др.)."
    audience: "Аппаратное совещание АЦ"
    description: |
      Три KPI-карточки (По плану, Исполнения, % освоения). Фильтр "Дата
      отчета" на вкладке. Факт собирается из трёх типов источников (витрина,
      stage, DWH), объединённых в Custom SQL Query.
    how_built: |
      Источник **KZHK**: Vertica, `10.7.7.231` / `baiterek`, схемы DM/
      STAGE_DO/DWH. Тип — Custom SQL Query.

      Custom SQL строит данные через `UNION ALL`:
      1. `DM.DM_CONTRACT_INFO` (`DO='КЖК'`, `CONTRACT_TYPE='Выкуп облигаций
         МИО'`).
      2. `DM.DM_PROJECTS` (`DO_NAME='КЖК'`, `FIN_INSTRUMENT_NAME=
         'Гарантирование долевого участия в жилищном строительстве'`,
         `PROJECT_COST > 0`, `AMOUNT_FUNDS_REPORT_YEAR IS NOT NULL OR
         OSV_FLG IS TRUE`).
      3. Статические строки с нулевыми значениями для программных категорий
         без факта (аренда, ИКИ, МЭКС, комплексная застройка, гарантирование
         долевого участия, Орда Аймақ и др.).
      4. Ручные/фиксированные строки с конкретными суммами по отдельным
         направлениям.
      5. `STAGE_DO.KGK_KHCDWH_OSVOENIE_VIEW`, только последний пакет
         (`PACKAGE_ID = MAX(PACKAGE_ID)`).

      Relationship план↔факт — calculated expression группирует несколько
      исходных значений `FIN_INSTRUMENT_NAME` в единые программные категории
      (например, "НП МЭКС" и "Финансирование МЭКС через выкуп ГЦБ МИО" →
      одна категория). Фильтры источника: `FIN_TOOL_NAME (D_FINANSING_PLAN1)
      keeps Null`, `Do (D_FINANSING_PLAN) keeps КЖК`.

      **Расчёт факта:** для программ "Приобретение арендного жилья" и
