name: ibm-mcp-stack

# Top-level compose for the Tableau MCP gateway stack.
#
# Includes ContextForge's base compose (gateway + postgres + redis + nginx),
# adds two federated MCP servers (Tableau MCP, dashboard-context) and a
# one-shot bootstrap job that registers them with the gateway.
#
# Run:
#   cp .env.example .env    # fill in Tableau PAT + JWT_SECRET_KEY
#   docker compose up -d
#
# Public entry point: http://localhost:8080/  (nginx → gateway)
# Admin UI:           http://localhost:8080/admin

include:
  - path: ../mcp-context-forge/docker-compose.yml
    env_file: .env

services:

  # ─────────────────────────────────────────────────────────────
  # Overrides for services from the included ContextForge compose:
  # skip local Containerfile.lite build (it pulls a linux/s390x
  # wheels image that requires GHCR auth) and use the released
  # image straight from GHCR.
  # ─────────────────────────────────────────────────────────────
  gateway:
    build: !reset null
    image: ${IMAGE_LOCAL:-ghcr.io/ibm/mcp-context-forge:v1.0.4}
    pull_policy: missing
    environment:
      # Base compose hardcodes both of these to `changeme`; re-thread through .env
      # so operators can rotate the seed password without patching the include.
      PLATFORM_ADMIN_PASSWORD: ${PLATFORM_ADMIN_PASSWORD}
      DEFAULT_USER_PASSWORD: ${PLATFORM_ADMIN_PASSWORD}

  migration:
    build: !reset null
    image: ${IMAGE_LOCAL:-ghcr.io/ibm/mcp-context-forge:v1.0.4}
    pull_policy: missing

  # The base compose hardcodes POSTGRES_PASSWORD=mysecretpassword on the
  # postgres service while other services template it from .env — that
  # mismatch bricks auth. Re-thread the env value through.
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  # ─────────────────────────────────────────────────────────────
  # Official Tableau MCP server, HTTP transport.
  # https://github.com/tableau/tableau-mcp — streamable-http on /tableau-mcp
  # ─────────────────────────────────────────────────────────────
  tableau-mcp:
    build:
      context: ./tableau-mcp
      args:
        TABLEAU_MCP_REF: ${TABLEAU_MCP_REF:-v2.22.0}
    image: local/tableau-mcp:${TABLEAU_MCP_REF:-v2.22.0}
    restart: unless-stopped
    networks: [mcpnet]
    environment:
      - TRANSPORT=http
      # tableau-mcp читает порт из env-переменной, ИМЯ которой указано в
      # HTTP_PORT_ENV_VAR_NAME (сама переменная HTTP_PORT напрямую не читается).
      - HTTP_PORT_ENV_VAR_NAME=HTTP_PORT
      - HTTP_PORT=3927
      # Гейт (ContextForge) в federated-режиме шлёт каждый tool-call как
      # отдельный HTTP-запрос и не трекает `Mcp-Session-Id` между вызовами.
      # В default-режиме tableau-mcp такие запросы отбрасывает с "no valid
      # session ID", а гейт ретраит → 429 от Tableau и "Failed to create
      # upstream MCP session" в логах. Отключаем управление сессиями —
      # каждый POST становится self-contained.
      - DISABLE_SESSION_MANAGEMENT=true
      - SERVER=${TABLEAU_SERVER}
      - SITE_NAME=${TABLEAU_SITE_NAME}
      - PAT_NAME=${TABLEAU_PAT_NAME}
      - PAT_VALUE=${TABLEAU_PAT_VALUE}
      - DEFAULT_LOG_LEVEL=${TABLEAU_LOG_LEVEL:-info}
      - INCLUDE_TOOLS=${TABLEAU_INCLUDE_TOOLS:-}
      - EXCLUDE_TOOLS=${TABLEAU_EXCLUDE_TOOLS:-}
      - MAX_RESULT_LIMIT=${TABLEAU_MAX_RESULT_LIMIT:-}
      - DATASOURCE_CREDENTIALS=${TABLEAU_DATASOURCE_CREDENTIALS:-}
      # Первая итерация: пропускаем OAuth 2.1 и работаем с PAT-only на стороне сервера.
      # Следующая итерация — прокидываем OAUTH_ISSUER на наш IdP и убираем этот флаг.
      - DANGEROUSLY_DISABLE_OAUTH=${TABLEAU_DISABLE_OAUTH:-true}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3927/tableau-mcp',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─────────────────────────────────────────────────────────────
  # Кастомный MCP-сервер: dashboard-context.
  # Отдаёт тулзы, которые обогащают дашборды Tableau бизнес-контекстом
  # (владельцы, freshness, KPI), смерженным с live-метаданными из Tableau REST.
  # Контекст теперь берётся из HTTP API сервиса-админки, а не читается из YAML
  # напрямую.
  # ─────────────────────────────────────────────────────────────
  dashboard-context:
    build: ./dashboard-context
    image: local/dashboard-context:0.1.0
    restart: unless-stopped
    networks: [mcpnet]
    environment:
      - TABLEAU_SERVER=${TABLEAU_SERVER}
      - TABLEAU_SITE_NAME=${TABLEAU_SITE_NAME}
      - TABLEAU_PAT_NAME=${TABLEAU_PAT_NAME}
      - TABLEAU_PAT_VALUE=${TABLEAU_PAT_VALUE}
      - TABLEAU_API_VERSION=${TABLEAU_API_VERSION:-3.22}
      - CATALOG_URL=http://dashboard-context-admin:8010/api/dashboards
      - HTTP_PORT=8000
    depends_on:
      dashboard-context-admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health',timeout=3).status==200 else sys.exit(1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────────────────────
  # Веб-админка для каталога dashboard-context.
  # Владеет YAML-файлом (примонтирован rw) и раздаёт его обратно MCP-серверу
  # через /api/dashboards. Также поднимает человеческий редактор на :8010/.
  # Nginx к ней НЕ подключён — держим внутри сети или пробрасываем осознанно
  # через свою авторизацию.
  # ─────────────────────────────────────────────────────────────
  dashboard-context-admin:
    build: ./dashboard-context
    image: local/dashboard-context:0.1.0
    restart: unless-stopped
    networks: [mcpnet]
    command: ["python", "-m", "dashboard_context.admin"]
    environment:
      - CATALOG_PATH=/app/catalog/dashboards.yml
      - HTTP_PORT=8010
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    ports:
      - "${ADMIN_PORT:-8010}:8010"
    volumes:
      - ./dashboard-context/catalog:/app/catalog:rw
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8010/healthz',timeout=3).status==200 else sys.exit(1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────────────────────
  # One-shot bootstrap: waits for gateway, registers both MCP servers.
  # Idempotent: re-running is safe (409 on duplicates is ignored).
  # ─────────────────────────────────────────────────────────────
  bootstrap:
    build: ./bootstrap
    image: local/mcp-bootstrap:0.1.0
    restart: "no"
    networks: [mcpnet]
    depends_on:
      gateway:
        condition: service_healthy
      tableau-mcp:
        condition: service_started
      dashboard-context:
        condition: service_started
    environment:
      - GATEWAY_URL=http://gateway:4444
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-mcpgateway-api}
      - JWT_ISSUER=${JWT_ISSUER:-mcpgateway}
      - ADMIN_EMAIL=${PLATFORM_ADMIN_EMAIL:-admin@example.com}
      - TABLEAU_MCP_URL=http://tableau-mcp:3927/tableau-mcp
      - DASHBOARD_CONTEXT_URL=http://dashboard-context:8000/mcp
